<div id="shaku-register-business-debug-banner" dir="rtl">
  <a id="shaku-register-business-debug-link" href="/register-business.html">
    ✨ سجّل نشاطك التجاري مجاناً ✨
  </a>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  <script id="register-business-global-cta-script">
  (function () {
    var labels = {
      ar: "✨ سجّل نشاطك التجاري مجاناً ✨",
      ku: "✨ بزنسەکەت بەخۆڕایی تۆمار بکە ✨",
      en: "✨ Register Your Business Free ✨"
    };

    function getLang() {
      var saved = "";
      try {
        saved = localStorage.getItem("preferred_lang") || "";
      } catch (e) {}

      var htmlLang = document.documentElement.getAttribute("lang") || "";
      var lang = saved || htmlLang || "ar";

      if (lang.indexOf("ku") === 0) return "ku";
      if (lang.indexOf("en") === 0) return "en";
      return "ar";
    }

    function updateBannerLanguage() {
      var lang = getLang();
      var banner = document.getElementById("shaku-register-business-debug-banner");
      var link = document.getElementById("shaku-register-business-debug-link");

      if (!banner || !link) return;

      link.textContent = labels[lang] || labels.ar;
      banner.setAttribute("dir", lang === "en" ? "ltr" : "rtl");
      banner.setAttribute("lang", lang);
    }

    updateBannerLanguage();
    window.addEventListener("storage", updateBannerLanguage);

    var oldSetItem = localStorage.setItem;
    localStorage.setItem = function (key, value) {
      oldSetItem.apply(this, arguments);
      if (key === "preferred_lang") {
        setTimeout(updateBannerLanguage, 0);
      }
    };

    setInterval(updateBannerLanguage, 700);
  })();
</script>
