      window.__shakuMakuPwaDebug = async function () {
        var manifestLink = document.querySelector('link[rel="manifest"]');
        var serviceWorkerSupported = "serviceWorker" in navigator;
        var registrations = serviceWorkerSupported ? await navigator.serviceWorker.getRegistrations() : [];
        async function fetchStatus(url) {
          try {
            var response = await fetch(url, { cache: "no-store" });
            return response.status + " " + response.statusText;
          } catch (error) {
            return error && error.message ? error.message : String(error);
          }
        }
        var debugInfo = {
          manifestLinkHref: manifestLink ? manifestLink.href : null,
          serviceWorkerSupported: serviceWorkerSupported,
          serviceWorkerRegistrations: registrations.map(function (registration) {
            return {
              scope: registration.scope,
              active: registration.active ? registration.active.scriptURL : null,
              installing: registration.installing ? registration.installing.scriptURL : null,
              waiting: registration.waiting ? registration.waiting.scriptURL : null
            };
          }),
          hasServiceWorkerController: Boolean(navigator.serviceWorker && navigator.serviceWorker.controller),
          isStandaloneDisplayMode: window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true,
          hasInstallPrompt: Boolean(window.__shakuMakuInstallPrompt),
          manifestFetchStatus: await fetchStatus("/manifest.json"),
          serviceWorkerFetchStatus: await fetchStatus("/sw.js")
        };
        console.info("[ShakuMaku] PWA debug", debugInfo);
        console.info("[ShakuMaku] PWA debug JSON", JSON.stringify(debugInfo));
      };

<script id="register-business-global-cta-language">
  (function () {
    var texts = {
      ar: "? ???? ????? ??????? ?????? ?",
      ku: "? ???????? ????? ??? ?",
      en: "? Register Your Business Free ?"
    };

    function getLang() {
      try {
        var stored = localStorage.getItem("preferred_lang");
        if (stored === "ar" || stored === "ku" || stored === "en") return stored;
      } catch (e) {}

      var htmlLang = document.documentElement.getAttribute("lang");
      if (htmlLang === "ar" || htmlLang === "ku" || htmlLang === "en") return htmlLang;

      return "ar";
    }

    function updateBannerLanguage() {
      var lang = getLang();
      var link = document.getElementById("shaku-register-business-link");
      var banner = document.getElementById("shaku-register-business-debug-banner");

      if (!link || !banner) return;

      link.textContent = texts[lang] || texts.ar;
      banner.setAttribute("dir", lang === "en" ? "ltr" : "rtl");
      link.setAttribute("dir", lang === "en" ? "ltr" : "rtl");
    }

    updateBannerLanguage();

    window.addEventListener("storage", updateBannerLanguage);
    window.addEventListener("focus", updateBannerLanguage);
    document.addEventListener("click", function () {
      window.setTimeout(updateBannerLanguage, 50);
      window.setTimeout(updateBannerLanguage, 300);
    });

    var observer = new MutationObserver(updateBannerLanguage);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["lang", "dir"]
    });
  })();
</script>
