  <script id="shaku-maku-install-capture">
    (function () {
      window.__shakuDeferredInstallPrompt = null;
      window.__shakuInstallReady = false;

      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        window.__shakuDeferredInstallPrompt = event;
        window.__shakuInstallReady = true;
        window.dispatchEvent(new CustomEvent("shaku-install-ready"));
      });

      window.addEventListener("appinstalled", function () {
        window.__shakuDeferredInstallPrompt = null;
        window.__shakuInstallReady = false;
        window.dispatchEvent(new CustomEvent("shaku-app-installed"));
      });
    })();
  </script>

  <script id="shaku-maku-sw-register">
    (function () {
      if (!("serviceWorker" in navigator)) return;

      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .then(function () { return navigator.serviceWorker.ready; })
          .then(function () { window.dispatchEvent(new CustomEvent("shaku-sw-ready")); })
          .catch(function (err) { console.warn("Shaku Maku service worker failed:", err); });
      });
    })();
  </script>

  <script id="shaku-install-button-hotfix">
    (function () {
      function isInstallTarget(el) {
        if (!el) return false;
        var text = (el.innerText || el.textContent || "").trim().toLowerCase();
        var cls = String(el.className || "").toLowerCase();
        var title = String(el.getAttribute && (el.getAttribute("title") || el.getAttribute("aria-label")) || "").toLowerCase();

        return (
          text.indexOf("install") >= 0 ||
          text.indexOf("ثب") >= 0 ||
          text.indexOf("دایبەزێنە") >= 0 ||
          cls.indexOf("install") >= 0 ||
          cls.indexOf("pwa") >= 0 ||
          title.indexOf("install") >= 0
        );
      }

      function showNote(message) {
        var old = document.getElementById("shaku-install-hotfix-note");
        if (old) old.remove();

        var note = document.createElement("div");
        note.id = "shaku-install-hotfix-note";
        note.textContent = message;
        note.style.cssText =
          "position:fixed;left:8px;top:calc(50% + 42px);z-index:2147483647;max-width:260px;padding:8px 10px;border-radius:12px;background:rgba(17,24,39,.95);color:white;font-size:12px;line-height:1.5;direction:rtl;box-shadow:0 10px 24px rgba(0,0,0,.3);";
        document.body.appendChild(note);

        setTimeout(function () {
          if (note && note.parentNode) note.parentNode.removeChild(note);
        }, 4200);
      }

      function tryInstall(e) {
        var el = e.target && e.target.closest && e.target.closest("button,a,[role='button'],div,span");
        if (!isInstallTarget(el)) return;

        var promptEvent = window.__shakuDeferredInstallPrompt;

        if (!promptEvent) {
          showNote("التثبيت غير جاهز بعد. انتظر 10 ثواني أو افتح قائمة Chrome ⋮ واختر Install app.");
          return;
        }

        e.preventDefault();
        e.stopPropagation();

        try {
          promptEvent.prompt();

          promptEvent.userChoice.finally(function () {
            window.__shakuDeferredInstallPrompt = null;
            window.__shakuInstallReady = false;
          });
        } catch (err) {
          showNote("Chrome لم يفتح نافذة التثبيت الآن. جرّب تحديث الصفحة أو القائمة ⋮.");
        }
      }

      document.addEventListener("click", tryInstall, true);
      document.addEventListener("touchend", tryInstall, true);
    })();
  </script>
