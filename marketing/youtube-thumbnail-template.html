<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    width: 1280px;
    height: 720px;
    font-family: Tahoma, Arial, sans-serif;
    background:
      radial-gradient(circle at 20% 20%, rgba(250,204,21,.35), transparent 28%),
      linear-gradient(135deg, #111827 0%, #3b2f2f 55%, #0f172a 100%);
    overflow: hidden;
    color: white;
  }
  .canvas {
    width: 1280px;
    height: 720px;
    position: relative;
    padding: 70px;
  }
  .badge {
    display: inline-block;
    background: #facc15;
    color: #111827;
    padding: 16px 30px;
    border-radius: 999px;
    font-size: 34px;
    font-weight: 900;
    margin-bottom: 32px;
  }
  h1 {
    font-size: 82px;
    line-height: 1.18;
    margin: 0;
    max-width: 760px;
    font-weight: 900;
    text-shadow: 0 8px 28px rgba(0,0,0,.45);
  }
  .sub {
    margin-top: 30px;
    font-size: 42px;
    font-weight: 800;
    color: #fde68a;
  }
  .phone {
    position: absolute;
    left: 92px;
    top: 92px;
    width: 310px;
    height: 540px;
    border-radius: 44px;
    background: #f9fafb;
    border: 12px solid #111827;
    box-shadow: 0 28px 70px rgba(0,0,0,.55);
    padding: 26px;
    color: #111827;
  }
  .phoneTop {
    height: 36px;
    width: 130px;
    background: #111827;
    border-radius: 0 0 20px 20px;
    margin: -26px auto 22px;
  }
  .appTitle {
    font-size: 28px;
    font-weight: 900;
    color: #7c2d12;
    margin-bottom: 20px;
  }
  .card {
    background: #fff7ed;
    border: 2px solid #fed7aa;
    border-radius: 22px;
    padding: 18px;
    margin-bottom: 15px;
    font-size: 22px;
    font-weight: 800;
  }
  .whatsapp {
    position: absolute;
    left: 340px;
    bottom: 78px;
    background: #22c55e;
    width: 122px;
    height: 122px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 62px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
  }
  .logo {
    position: absolute;
    right: 70px;
    bottom: 52px;
    font-size: 34px;
    font-weight: 900;
    color: #facc15;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="badge">مجاني لفترة محدودة</div>
    <h1>خلي مشروعك يظهر للزبائن</h1>
    <div class="sub">سجّل مشروعك على شكو ماكو</div>

    <div class="phone">
      <div class="phoneTop"></div>
      <div class="appTitle">شكو ماكو</div>
      <div class="card">مطاعم</div>
      <div class="card">كافيهات</div>
      <div class="card">صيدليات</div>
      <div class="card">خدمات قريبة منك</div>
    </div>

    <div class="whatsapp">☎</div>
    <div class="logo">Shaku Maku | شكو ماكو</div>
  </div>
</body>
</html>
